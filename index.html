<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Extendr — Build Chrome Extensions with AI in Seconds</title>
    <meta name="description" content="Extendr is an AI-powered Chrome extension builder. Describe what you want, and Extendr builds, previews, and packages your Manifest V3 extension in seconds. No coding required." />
    <meta name="author" content="Extendr" />
    <meta name="keywords" content="chrome extension builder, ai chrome extension, build chrome extension, manifest v3, browser extension creator, no code chrome extension, extendr, ai extension builder" />
    <link rel="canonical" href="https://extendr.dev/" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#050609" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://extendr.dev/" />
    <meta property="og:title" content="Extendr — Build Chrome Extensions with AI in Seconds" />
    <meta property="og:description" content="Describe what you want, and Extendr builds, previews, and packages your Manifest V3 Chrome extension in seconds. No coding required." />
    <meta property="og:image" content="https://extendr.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Extendr" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Extendr — Build Chrome Extensions with AI in Seconds" />
    <meta name="twitter:description" content="Describe what you want, and Extendr builds, previews, and packages your Manifest V3 Chrome extension in seconds. No coding required." />
    <meta name="twitter:image" content="https://extendr.dev/og-image.png" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Extendr",
      "url": "https://extendr.dev",
      "logo": "https://extendr.dev/logo.svg",
      "description": "AI-powered Chrome extension builder. Build, preview, and package Manifest V3 extensions in seconds.",
      "sameAs": []
    }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Extendr",
      "url": "https://extendr.dev",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "description": "AI-powered Chrome extension builder. Describe what you want and get a fully functional Manifest V3 Chrome extension with live preview.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "50"
      }
    }
    </script>

    <!-- Structured Data: WebSite (enables sitelinks search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Extendr",
      "url": "https://extendr.dev",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://extendr.dev/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Extendr?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Extendr is an AI-powered Chrome extension builder that lets you create fully functional Manifest V3 browser extensions by simply describing what you want. No coding experience required."
          }
        },
        {
          "@type": "Question",
          "name": "How does Extendr work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Just describe your Chrome extension idea in plain English. Extendr's AI generates all the code, previews it live in your browser, and packages it for installation — all in seconds."
          }
        },
        {
          "@type": "Question",
          "name": "Is Extendr free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Extendr offers a free tier with credits to get started. Premium plans provide more credits and additional features for power users."
          }
        },
        {
          "@type": "Question",
          "name": "Does Extendr support Manifest V3?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Extendr generates Chrome extensions using Manifest V3, the latest extension platform required by the Chrome Web Store."
          }
        }
      ]
    }
    </script>

    <!-- Google Fonts - Momo Trust Display, Inter, Instrument Serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=Momo+Trust+Display&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
